<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estructura Responsive</title>
    <link rel="stylesheet" href="responsive-flow.css" />
  </head>
  <body>
    <header class="site-header">
      <img class="site-logo" src="sticky-header-content.svg" alt="Header" />
    </header>

    <main class="page">
      <section class="section">
        <div class="section-inner">
          <article class="content-block">
            <h1>Desktop 1</h1>
            <p>Contenido principal de la seccion.</p>
          </article>

          <article class="media-block">
            <img src="desktop1-appear-image.png" alt="" />
          </article>
        </div>
      </section>

      <section class="section">
        <div class="card-grid">
          <article class="card">
            <img src="desktop10-front.png" alt="" />
          </article>

          <article class="card">
            <img src="desktop10-details.png" alt="" />
          </article>

          <article class="card">
            <img src="desktop11-carousel-slide-1.png" alt="" />
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
